services:
  postgres:
    image: postgres:16-alpine
    container_name: advisor-postgres
    environment:
      POSTGRES_DB: advisor
      POSTGRES_USER: advisor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U advisor"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:latest
    container_name: advisor-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "FALSE"

  redis:
    image: redis:7-alpine
    container_name: advisor-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ai-hedge-fund
    container_name: advisor-api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ../.env:/app/.env
      - ..:/app
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+psycopg2://advisor:${POSTGRES_PASSWORD:-change-me}@postgres:5432/advisor
      REDIS_URL: redis://redis:6379/0
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    tty: true
    stdin_open: true

volumes:
  postgres_data:
  chroma_data:
